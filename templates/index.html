<!DOCTYPE html>
<html>
<head>
    <title>Resume Detection Portal</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-lg p-4">
            <h1 class="text-center text-primary mb-4">Resume Detection Portal</h1>
            <p class="text-center text-muted">Upload your resume (.pdf or .docx) and get instant analysis</p>
            <form method="POST" enctype="multipart/form-data" class="text-center">
                <div class="mb-3">
                    <input type="file" name="resume" accept=".pdf,.docx" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Analyze Resume</button>
            </form>
        </div>
    </div>
</body>
</html>
